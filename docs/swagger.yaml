basePath: /
definitions:
  email.UserSendConfirmEmailService:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  models.AcceptFriend:
    properties:
      account_id:
        type: integer
    required:
    - account_id
    type: object
  models.AppliSearch:
    properties:
      msg:
        type: string
      send_email:
        type: string
    required:
    - msg
    - send_email
    type: object
  models.Apply:
    properties:
      from_email:
        type: string
      from_id:
        type: integer
      msg:
        type: string
      send_email:
        type: string
      send_id:
        type: integer
      send_name:
        type: string
      send_pictures:
        type: string
      status:
        type: integer
      time:
        type: string
    type: object
  models.ChatMsg:
    properties:
      context:
        type: string
      msg_type:
        type: integer
      receiver_id:
        type: integer
    required:
    - context
    - msg_type
    - receiver_id
    type: object
  models.Contact:
    properties:
      error:
        type: string
      list:
        items:
          $ref: '#/definitions/models.ListContact'
        type: array
    type: object
  models.ContactMain:
    properties:
      friend-picture:
        type: string
      friend_email:
        type: string
      friend_id:
        type: integer
      friend_name:
        type: string
      gender:
        type: integer
      remark:
        type: string
      signature:
        type: string
    type: object
  models.FindEnd:
    properties:
      error:
        type: string
      find:
        $ref: '#/definitions/models.FindMiddle'
    type: object
  models.FindMiddle:
    properties:
      ID:
        type: integer
      email:
        type: string
      name:
        type: string
      pictures:
        type: string
    type: object
  models.FindNameEnd:
    properties:
      error:
        type: string
      find:
        items:
          $ref: '#/definitions/models.FindNameMiddle'
        type: array
    type: object
  models.FindNameMiddle:
    properties:
      ID:
        type: integer
      email:
        type: string
      name:
        type: string
      pictures:
        type: string
    type: object
  models.FindNamePerson:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  models.FindPerson:
    properties:
      email:
        type: string
    type: object
  models.FriendMain:
    properties:
      friend_id:
        type: integer
    type: object
  models.FriendRemark:
    properties:
      friend_id:
        type: integer
      remark:
        type: string
    type: object
  models.HistoryMsg:
    properties:
      msg:
        items:
          $ref: '#/definitions/models.ChatMsg'
        type: array
      page:
        type: integer
      receiver_id:
        type: integer
      size:
        type: integer
    required:
    - receiver_id
    type: object
  models.HistoryResponse:
    properties:
      err:
        type: string
      msg:
        $ref: '#/definitions/models.HistoryMsg'
    type: object
  models.ListAppResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/models.Apply'
        type: array
      msg:
        example: success
        type: string
    type: object
  models.ListContact:
    properties:
      friend_id:
        type: integer
      friend_name:
        type: string
      friend_picture:
        type: string
      remark:
        type: string
      user_id:
        type: integer
    type: object
  models.LoginResponse:
    properties:
      msg:
        type: string
      token:
        type: string
      user_id:
        type: integer
    type: object
  models.LoginServer:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.PictureMainReturn:
    properties:
      err:
        type: string
      picture:
        items:
          $ref: '#/definitions/models.Pictures'
        type: array
    type: object
  models.Pictures:
    properties:
      id:
        type: integer
      web:
        type: string
    type: object
  models.ReEmail:
    properties:
      code:
        type: string
      new_email:
        type: string
    required:
    - code
    - new_email
    type: object
  models.ReUpdate:
    properties:
      code:
        type: string
      new_password:
        type: string
    required:
    - code
    - new_password
    type: object
  models.ReadContact:
    properties:
      friend_id:
        type: integer
    required:
    - friend_id
    type: object
  models.RefuseFriend:
    properties:
      account_id:
        type: integer
    required:
    - account_id
    type: object
  models.RegisterServer:
    properties:
      code:
        type: string
      email:
        type: string
      password:
        type: string
      re_password:
        type: string
    required:
    - code
    - email
    - password
    - re_password
    type: object
  models.UserMain:
    properties:
      email:
        type: string
      gender:
        description: 0为男 1为女 2为未知
        type: integer
      name:
        type: string
      picture:
        type: string
      picture_id:
        type: integer
      signature:
        type: string
    type: object
  models.UserMain2:
    properties:
      gender:
        description: 0男 1女 2未知
        type: integer
      name:
        type: string
      picture_id:
        type: integer
      signature:
        type: string
    type: object
  models.UserMainReturn:
    properties:
      err:
        type: string
      user:
        $ref: '#/definitions/models.UserMain'
    type: object
info:
  contact: {}
  description: IM Chat backend API documentation.
  title: IM Chat API
  version: "2.0"
paths:
  /application/accept:
    put:
      consumes:
      - application/json
      parameters:
      - description: 同意申请请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AcceptFriend'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 同意好友申请
      tags:
      - application
  /application/create:
    post:
      consumes:
      - application/json
      parameters:
      - description: 申请请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AppliSearch'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 申请请求添加好友
      tags:
      - application
  /application/list:
    get:
      consumes:
      - application/json
      description: 返回我收到的好友申请列表
      produces:
      - application/json
      responses:
        "200":
          description: msg=success 时 list 为申请数组
          schema:
            $ref: '#/definitions/models.ListAppResponse'
      security:
      - BearerAuth: []
      summary: 查看全部接收到的申请
      tags:
      - application
  /application/mylist:
    get:
      consumes:
      - application/json
      description: 返回我发出的好友申请列表
      produces:
      - application/json
      responses:
        "200":
          description: msg=success 时 list 为申请数组
          schema:
            $ref: '#/definitions/models.ListAppResponse'
      security:
      - BearerAuth: []
      summary: 查看全部已发申请
      tags:
      - application
  /application/refuse:
    put:
      consumes:
      - application/json
      parameters:
      - description: 拒绝申请请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RefuseFriend'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 拒绝好友申请
      tags:
      - application
  /application/search/email:
    post:
      parameters:
      - description: 按邮箱搜索
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.FindPerson'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.FindEnd'
      security:
      - BearerAuth: []
      summary: 搜索邮箱查看待添加好友
      tags:
      - application
  /application/search/name:
    post:
      consumes:
      - application/json
      parameters:
      - description: 按名字模糊搜索
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.FindNamePerson'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.FindNameEnd'
      security:
      - BearerAuth: []
      summary: 搜索名字查看待添加好友
      tags:
      - application
  /chat/history:
    get:
      consumes:
      - application/json
      parameters:
      - description: 对方用户 ID
        in: query
        name: receiver_id
        required: true
        type: integer
      - description: 页码，默认 1
        in: query
        name: page
        type: integer
      - description: 每页条数，默认 20，最大 100
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.HistoryResponse'
      security:
      - BearerAuth: []
      summary: 查看历史聊天记录
      tags:
      - chat
  /chat/read:
    post:
      consumes:
      - application/json
      parameters:
      - description: 会话已读请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ReadContact'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 更改消息为已读
      tags:
      - chat
  /chat/show/all:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Contact'
      security:
      - BearerAuth: []
      summary: 展示所有未被删除的聊天框（侧边框）
      tags:
      - Chat
  /contact/change/remark:
    post:
      parameters:
      - description: 修改备注请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.FriendRemark'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 修改朋友备注
      tags:
      - Contact
  /contact/friend/main:
    post:
      consumes:
      - application/json
      parameters:
      - description: 查看请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.FriendMain'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ContactMain'
      security:
      - BearerAuth: []
      summary: 查看朋友详细信息
      tags:
      - Contact
  /contact/list:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Contact'
      security:
      - BearerAuth: []
      summary: 查看通讯录
      tags:
      - Contact
  /email/send:
    post:
      consumes:
      - application/json
      parameters:
      - description: 邮箱验证码请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/email.UserSendConfirmEmailService'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: 发送邮箱验证码
      tags:
      - email
  /user/create:
    post:
      consumes:
      - application/json
      parameters:
      - description: 完善资料：name 空则保留原名；gender/signature/picture_id 省略则不改；signature
          可传空串清空；picture_id 为图片库 id（≥1），<1 时按默认头像 id=1 保存
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UserMain2'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 完善用户资料
      tags:
      - user
  /user/deleteUser:
    delete:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 删除用户
      tags:
      - user
  /user/heartbeat:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 心跳续期
      tags:
      - user
  /user/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginServer'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LoginResponse'
      summary: 用户登录
      tags:
      - user
  /user/pwd/code/send:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 发送验证码以便验证身份
      tags:
      - user
  /user/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: 注册请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RegisterServer'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: 用户注册
      tags:
      - user
  /user/show/main:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.UserMainReturn'
      security:
      - BearerAuth: []
      summary: 显示当前用户资料
      tags:
      - user
  /user/show/pictures:
    post:
      consumes:
      - application/json
      description: 返回 picture 表全部 id、web（需登录，无请求体）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.PictureMainReturn'
        "401":
          description: 未登录或 token 无效
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 展示图片库
      tags:
      - user
  /user/update/email:
    put:
      consumes:
      - application/json
      parameters:
      - description: 修改邮箱请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ReEmail'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 修改邮箱
      tags:
      - user
  /user/update/pwd:
    put:
      consumes:
      - application/json
      parameters:
      - description: 修改密码请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ReUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 修改密码
      tags:
      - user
schemes:
- http
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
