  /socket.io/{any}:
    get:
      consumes:
      - application/json
      description: |-
        本接口不是普通的 HTTP 接口，而是 **Socket.IO 长连接入口**。
        Swagger/OpenAPI 2.0 无法完整描述事件流，前端请配合 `docs/socketio_protocol.md`
        或 `docs/asyncapi.yaml` 查看完整协议。下面给出最小必要说明：

        ### 1. 建立连接
        - 路径：`/socket.io/`（默认 path，Socket.IO 客户端会自动拼接）
        - 鉴权：通过 query 参数携带登录后的 `token`（JWT）
        - 示例：`io("http://host:port", { query: { token: "<JWT>" }, transports: ["websocket"] })`
        - Token 为空或非法会被立即 `disconnect`

        ### 2. 客户端 → 服务端 事件：`msg`
        payload 为一个 JSON 对象，结构见 `models.WsMsg`。关键字段：
        - `type` string：`private` 或 `text`，均表示私聊消息
        - `receiver_id` int64：接收方用户 ID（必填）
        - `msg_type` int：`1=文本消息`，`2=文件消息`
        - `msg` string：文本内容；当 `msg_type=2` 时，可把文件 URL 放这里
        - `file_url` string：文件地址（`msg_type=2` 建议必填；若只传 `msg`，服务端会自动把 `msg` 赋值给 `file_url`）
        - `file_name` string：文件名（`msg_type=2` 建议传）
        - `sender_id` 由服务端从 token 解析，**前端不需要传**，传了也会被覆盖

        **文本消息示例：**
        ```json
        { "type": "private", "receiver_id": 1024, "msg_type": 1, "msg": "你好呀" }
        ```
        **文件消息示例：**
        ```json
        { "type": "private", "receiver_id": 1024, "msg_type": 2,
        "msg": "https://cdn.example.com/f/abc.png",
        "file_url": "https://cdn.example.com/f/abc.png",
        "file_name": "abc.png" }
        ```

        ### 3. 服务端 → 客户端 事件：`message`
        收到消息或 ack 时，服务端会向对应用户 emit `message` 事件，payload 同样是 `models.WsMsg`。
        - 对**发送方**：收到 `type=ack` 的回执，代表服务端已受理（`msg="ok"`）
        - 对**接收方**：收到 `type=private` 的消息体，带 `sender_id` / `msg_type` / `msg` / `file_url` / `file_name`

        ### 4. 断开连接
        直接 `socket.disconnect()` 即可，服务端会自动清理在线态。
        同一个用户重复登录时，旧连接会被服务端主动踢下线。
      parameters:
      - description: 登录后的 JWT Token
        in: query
        name: token
        required: true
        type: string
      - default: "4"
        description: Socket.IO Engine.IO 版本，一般由客户端 SDK 自动填
        in: query
        name: EIO
        type: string
      - description: 传输方式，推荐 websocket
        enum:
        - websocket
        - polling
        in: query
        name: transport
        type: string
      - description: Socket.IO 握手/轮询路径，由客户端 SDK 自动补全
        in: path
        name: any
        required: true
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: WebSocket Switching Protocols（握手成功）
          schema:
            type: string
        "200":
          description: 服务端回推的 message 事件 payload（仅用于文档展示，实际通过 Socket.IO 事件传递）
          schema:
            $ref: '#/definitions/models.WsMsg'
        "401":
          description: token 缺失或非法，连接会被立即关闭
          schema:
            type: string
      summary: Socket.IO 私聊通道（非 HTTP 接口，详见下方协议说明）
      tags:
      - chat
